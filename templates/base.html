<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}What Would YOU Know?{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  {% if current_user %}
  <nav class="nav">
    <a href="{{ url_for('home') }}" class="nav-logo">wwYK?</a>
    <div class="nav-links">
      <a href="{{ url_for('stats', user_id=current_user['id']) }}">My Stats</a>
      <a href="{{ url_for('add_skill') }}">+ Skill</a>
      <a href="{{ url_for('new_challenge') }}">Challenge</a>
      <a href="{{ url_for('refresher') }}">Refresher</a>
      <a href="{{ url_for('select_user') }}" class="nav-user">{{ current_user['name'] }} ▾</a>
    </div>
  </nav>
  {% endif %}

  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-container">
          {% for msg in messages %}
            <div class="flash">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
